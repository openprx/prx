[advisories]
ignore = [
    # bincode v2.0.1 via probe-rs — project considered complete
    "RUSTSEC-2025-0141",
    # lettre 0.11.19 boring-tls path 未启用 (rustls-tls used) — 详见 SECURITY.md
    "RUSTSEC-2026-0141",
    # derivative unmaintained — matrix-sdk-indexeddb transitive，仅 wasm 路径
    "RUSTSEC-2024-0388",
    # proc-macro-error2 unmaintained — transitive via matrix-sdk (vodozemac/aquamarine), no maintained alternative
    "RUSTSEC-2026-0173",
    # RUSTSEC-2026-0189 rmcp 0.14 streamable-http SERVER DNS-rebinding — NOT reachable:
    # PRX uses rmcp client-only (StreamableHttpClientTransport, src/tools/mcp.rs); no ServerHandler / server transport instantiated.
    # Tracked follow-up: upgrade rmcp to >=1.4.0 (major, breaking) or drop the unused `server` feature.
    "RUSTSEC-2026-0189",
]
informational_warnings = ["unmaintained"]
severity_threshold = "low"

[database]
fetch = true
stale = false

[output]
deny = ["unmaintained"]
format = "terminal"
quiet = false
show_tree = true

[yanked]
enabled = true
update_index = true
