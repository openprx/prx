# OpenPRX Evolution Configuration Example
# Copy to workspace/evolution_config.toml and adjust as needed.

[runtime]
# Evolution mode: shadow (suggestions only) / auto (auto-execute)
mode = "shadow"
# Evolution log root directory (relative paths resolve against workspace_dir)
storage_dir = "self/evolution"
# JSONL batch write threshold (auto-flush when reached)
batch_size = 64
# Config hot-reload poll interval (seconds)
poll_interval_secs = 3

[runtime.retention]
# Hot data retention (days)
hot_days = 30
# Warm data retention (days)
warm_days = 90
# Cold data retention (days)
cold_days = 180

[runtime.data_thresholds]
# Decision log threshold (enables stronger evolution actions when reached)
decision_log = 200
# Memory access log threshold
memory_access = 800
# Same-failure threshold (for degradation/circuit-breaker strategies)
same_failure = 25

[retrieval]
# Sample size threshold to enable vector-enhanced retrieval
vector_retrieval_threshold = 2000

[retrieval.score_weights]
# Memory retrieval score weight: recency
recency = 0.3
# Memory retrieval score weight: access frequency
access_freq = 0.2
# Memory retrieval score weight: category match
category_weight = 0.15
# Memory retrieval score weight: usefulness ratio
useful_ratio = 0.2
# Memory retrieval score weight: source confidence
source_confidence = 0.15

[gate]
# Minimum improvement threshold (reject if average improvement is below this)
min_improvement = 0.03
# Maximum allowed regression (reject if below this)
max_regression = -0.05
# Maximum allowed token degradation ratio
max_token_degradation = 0.10

[memory]
# L1 memory layer output token limit
max_tokens = 2048

[memory.retrieval_fusion]
# L1 fusion weight: bm25
bm25 = 0.4
# L1 fusion weight: vector
vector = 0.4
# L1 fusion weight: metadata
metadata = 0.2

[prompt]
# L2 mutable prompt files (relative to workspace)
mutable_files = []
# L2 immutable prompt files (relative to workspace)
immutable_files = []
# L2 severity threshold requiring human approval
human_approval_severity = 3
# L2 max rollback versions for prompt history
max_rollback_versions = 10
# L2 blocked keywords (safety guardrail)
blocked_keywords = [
  "disable safety",
  "bypass policy",
  "ignore security",
  "remove guardrail",
]

[strategy]
# L3 strategy file path (relative to workspace)
decision_policy_path = "decision_policy.toml"
# L3 parameter mutation range (0.15 = ±15%)
param_mutation_range = 0.15

[rollback]
# Max rollback snapshot versions
max_versions = 10
# Circuit breaker threshold (opens after N consecutive failures)
circuit_breaker_threshold = 5
# Cooldown hours after rollback
cooldown_after_rollback_hours = 24
