# cargo-deny configuration — OpenPRX standard v2
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true
exclude-dev = false

[output]
feature-depth = 1

# ===== 安全漏洞 =====
[advisories]
yanked = "deny"
unmaintained = "all"
unsound = "workspace"
# Review all ignores by: 2026-06-01
ignore = [
    # bincode v2.0.1 via probe-rs — project ceased but 1.3.3 considered complete
    { id = "RUSTSEC-2025-0141", reason = "bincode: probe-rs transitive dep, project considered complete" },
    # lettre boring-tls path 未启用 (PRX 使用 rustls-tls feature)，CVE 不可达 — 详见 SECURITY.md
    { id = "RUSTSEC-2026-0141", reason = "lettre boring-tls not enabled; PRX uses rustls-tls — unreachable" },
    # proc-macro-error2 unmaintained: transitive via matrix-sdk (vodozemac → matrix-pickle-derive)
    # and aquamarine (matrix-sdk-crypto). No maintained alternative; upstream matrix-sdk tracks this.
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2: transitive via matrix-sdk/vodozemac, no maintained alternative, upstream matrix-sdk tracks migration" },
    { id = "RUSTSEC-2026-0189", reason = "rmcp streamable-http SERVER DNS-rebinding — PRX uses rmcp client-only (StreamableHttpClientTransport, src/tools/mcp.rs); no server transport instantiated, unreachable. Follow-up: rmcp>=1.4.0 or drop server feature." },
]

# ===== 许可证合规 =====
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
include-dev = false
include-build = true
unused-allowed-license = "allow"

[licenses.private]
ignore = true

# ===== 依赖禁用 =====
[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true
allow-workspace = true
highlight = "all"

deny = [
    { crate = "openssl", reason = "Use rustls-tls instead", use-instead = "rustls" },
    { crate = "openssl-sys", reason = "Use rustls-tls instead" },
]

[[bans.features]]
crate = "reqwest"
deny = ["native-tls", "native-tls-vendored"]

[bans.workspace-dependencies]
duplicates = "warn"
unused = "warn"

# ===== 来源可信 =====
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
