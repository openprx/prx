name: Sec Audit

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/**"
      - "deny.toml"
      - '.cargo/audit.toml'
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/**"
      - "deny.toml"
      - '.cargo/audit.toml'
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: License & Supply Chain
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    # S5 P0-4: advisories 分支移除 continue-on-error，发布门真正阻断
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
          arguments: --all-features

  miri:
    name: Miri UB Smoke
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo miri smoke
        run: MIRIFLAGS="-Zmiri-strict-provenance" cargo +nightly miri test --lib

  coverage:
    name: Coverage
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Run cargo-llvm-cov
        run: cargo llvm-cov --workspace --lcov --output-path coverage.lcov

  mutants:
    name: Mutation Smoke
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: List cargo-mutants candidates
        run: cargo mutants --workspace --list

  fuzz:
    name: Fuzz Smoke
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run cargo-fuzz smoke
        run: cargo +nightly fuzz run parse_tool_call_json -- -max_total_time=60
