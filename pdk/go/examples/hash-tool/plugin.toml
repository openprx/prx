[plugin]
name        = "hash-tool"
version     = "0.1.0"
description = "SHA-256 hash computation tool — Go PDK example"
author      = "PRX Team"
wasm        = "plugin.wasm"

[[capabilities]]
type        = "tool"
name        = "hash"
description = "Compute SHA-256 hash of input text"

[permissions]
required = ["log"]
optional = []

[resources]
max_fuel              = 50_000_000
max_memory_mb         = 4
max_execution_time_ms = 500

[config]
# No configuration needed for this tool
