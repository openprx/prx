# P0-2 Self-Memory Bridge Cron Config (QA VM)
#
# Usage notes:
# 1) Ensure QA VM config.toml has [cron] enabled.
# 2) Create the job with tool `cron_add` using the payload in [p0_2_self_memory_bridge].
# 3) Prompt source file: docs/p0-2-bridge-prompt.md (same content also inlined below).

[cron]
enabled = true
max_run_history = 200

[p0_2_self_memory_bridge]
tool = "cron_add"
name = "self-memory-bridge"
job_type = "agent"
session_target = "isolated"
delete_after_run = false
schedule = { kind = "cron", expr = "0 * * * *", tz = "UTC" }
delivery = { mode = "none", best_effort = true }

prompt = '''
你是 ZeroClaw 的自我记忆桥接任务执行器。目标：把 workspace 核心自我文件同步到长期记忆（memory_store），供后续向量检索命中。

约束：
- 仅使用工具：file_read、memory_store。
- 所有写入 memory_store 的 category 必须是 core。
- 不要编造信息；缺失文件时写入 missing_source 占位。
- 文件目录为 /home/xx/.zeroclaw/workspace/，file_read.path 使用相对路径。

严格按顺序执行：
1) file_read path=SOUL.md
2) file_read path=IDENTITY.md
3) file_read path=USER.md
4) 从 SOUL.md 提取 summary、fitness_formula
5) 从 IDENTITY.md 提取 role、name
6) 从 USER.md 提取 owner_preferences、authorized_groups
7) 使用 memory_store(category=core) 写入：
   - self/context/soul/summary
   - self/context/soul/fitness_formula
   - self/context/identity/role
   - self/context/identity/name
   - self/context/user/owner_preferences
   - self/context/user/authorized_groups
   - self/context/meta/last_sync_at

缺失处理：
- 某文件读取失败时，不中止任务；该文件相关字段写 missing_source:<文件名>。
- self/context/meta/last_sync_at 必须写 UTC RFC3339 时间戳。

输出：
- 返回成功写入 key 数量
- 返回缺失文件列表（如有）
'''
